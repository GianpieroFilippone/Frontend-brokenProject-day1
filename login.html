<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accedi — LipariBank</title>
  <link rel="stylesheet" href="dist/main.css">
</head>
<body>

  <div class="login-page">
    <div class="login-card">

      <div class="login-card__logo">
        <img src="assets/logo.svg" alt="LipariBank">
      </div>

      <h1 class="login-card__title">Bentornato</h1>
      <p class="login-card__subtitle">Accedi al tuo conto LipariBank</p>

      <form action="dashboard.html" method="get">

        <div class="form-group">
          <label for="username">Codice cliente / Email</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-control"
            placeholder="mario.rossi@email.it"
            autocomplete="username"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">
            Password
            <a href="#" style="float:right; font-size:12px; color:#2d7dd2; text-decoration:none; font-weight:400;">
              Password dimenticata?
            </a>
          </label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>

        <button type="submit" class="btn btn--primary btn--full btn--lg">
          Accedi
        </button>

      </form>

      <div class="login-card__footer">
        Non hai un conto? <a href="#">Aprilo ora</a>
      </div>

    </div>
  </div>

</body>
</html>
